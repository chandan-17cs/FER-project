<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Emotion Recognition - AI Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #dbeafe 50%, #cffafe 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            padding: 0.75rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #2563eb, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #4b5563;
            font-size: 1.125rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .webcam-container {
            position: relative;
            background: #111827;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        video {
            width: 100%;
            min-height: 400px;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .webcam-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827;
        }

        .webcam-placeholder {
            text-align: center;
            color: #9ca3af;
        }

        .webcam-placeholder svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            opacity: 0.6;
        }

        .live-indicator {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
        }

        .live-dot.active {
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-text {
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .button {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .button:active {
            transform: scale(0.95);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-green {
            background: #16a34a;
            color: white;
        }

        .button-green:hover {
            background: #15803d;
        }

        .button-red {
            background: #dc2626;
            color: white;
        }

        .button-red:hover {
            background: #b91c1c;
        }

        .button-blue {
            background: #2563eb;
            color: white;
        }

        .button-blue:hover {
            background: #1d4ed8;
        }

        .button-orange {
            background: #ea580c;
            color: white;
        }

        .button-orange:hover {
            background: #c2410c;
        }

        .button-white {
            background: white;
            color: #374151;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .button-white:hover {
            background: #f9fafb;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .controls .button:first-child {
            flex: 1;
        }

        .emotion-display {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .emotion-placeholder {
            text-align: center;
        }

        .emotion-placeholder svg {
            width: 64px;
            height: 64px;
            color: #9ca3af;
            margin: 0 auto 1rem;
        }

        .emotion-emoji {
            font-size: 5rem;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.1));
        }

        .emotion-label {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 1rem 0 0.5rem;
        }

        .confidence {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4b5563;
            margin-bottom: 1rem;
        }

        .confidence-value {
            font-size: 1.125rem;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.3s;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: #374151;
            font-size: 1.125rem;
            font-weight: 600;
        }

        .section-header svg {
            width: 20px;
            height: 20px;
        }

        .history-list, .stats-list {
            padding: 1.5rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #f9fafb;
        }

        .history-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .history-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .history-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .history-confidence {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .history-time {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .stat-item {
            margin-bottom: 1rem;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .stat-count {
            font-size: 0.875rem;
            color: #4b5563;
        }

        .stat-percentage {
            font-size: 0.875rem;
            font-weight: bold;
            width: 48px;
            text-align: right;
        }

        .stat-total {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .stat-total-value {
            font-weight: bold;
            color: #1f2937;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #6b7280;
            font-size: 0.875rem;
        }

        .alert {
            margin-top: 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            align-items: start;
            gap: 0.75rem;
        }

        .alert svg {
            width: 20px;
            height: 20px;
            color: #dc2626;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .alert-text {
            color: #991b1b;
            font-size: 0.875rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21.75 12c0 5.385-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12 6.615 2.25 12 2.25s9.75 4.365 9.75 9.75z"/>
                        <path d="M9 9.563C9 9.252 9.252 9 9.563 9h4.874c.311 0 .563.252.563.563v4.874c0 .311-.252.563-.563.563H9.564A.562.562 0 0 1 9 14.437V9.564z" fill="#fff"/>
                    </svg>
                </div>
                <h1>Face Emotion Recognition</h1>
            </div>
            <p class="subtitle">Real-time facial emotion detection using Deep Learning</p>
        </header>

        <div class="main-grid">
            <div>
                <div class="webcam-container">
                    <video id="webcam" autoplay playsinline muted class="hidden"></video>
                    <div id="webcam-placeholder" class="webcam-overlay">
                        <div class="webcam-placeholder">
                            <svg fill="currentColor" viewBox="0 0 24 24">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4" fill="#111827"/>
                            </svg>
                            <p style="font-size: 1.125rem;">Webcam is off</p>
                        </div>
                    </div>
                    <div class="live-indicator">
                        <div id="live-dot" class="live-dot"></div>
                        <span id="live-text" class="live-text">OFFLINE</span>
                    </div>
                </div>

                <div id="error-alert" class="alert hidden">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        <path d="M12 8v4m0 4h.01" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p class="alert-text" id="error-text"></p>
                </div>

                <button id="webcam-toggle" class="button button-green" style="margin-top: 1rem;">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    Start Webcam
                </button>

                <div id="detection-controls" class="controls hidden">
                    <button id="detection-toggle" class="button button-blue">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Start Detection
                    </button>
                    <button id="reset-button" class="button button-white" disabled>
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                        Reset
                    </button>
                </div>
            </div>

            <div class="card">
                <div id="emotion-display" class="emotion-display">
                    <div class="emotion-placeholder">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <h3 style="font-size: 1.25rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem;">No Detection</h3>
                        <p style="color: #6b7280;">Start the webcam to begin emotion detection</p>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 1.5rem;">
            <div class="card history-list">
                <div class="section-header">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        <path stroke-width="2" stroke-linecap="round" d="M12 6v6l4 2"/>
                    </svg>
                    Recent Detections
                </div>
                <div id="history-content" class="empty-state">No detections yet</div>
            </div>

            <div class="card stats-list">
                <div class="section-header">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Emotion Statistics
                </div>
                <div id="stats-content" class="empty-state">No data available</div>
            </div>
        </div>

        <footer>
            <p>Powered by AI • Real-time Emotion Detection</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
